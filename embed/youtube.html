<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Reproduzir vídeo</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
    .error {
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
      text-align: center;
      padding: 1.5rem;
    }
  </style>
</head>
<body>
  <iframe
    id="player"
    title="YouTube"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen
    referrerpolicy="strict-origin-when-cross-origin"
  ></iframe>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var videoId = params.get('v') || (location.hash || '').replace(/^#v=/, '');
      var player = document.getElementById('player');

      if (!videoId) {
        document.body.innerHTML = '<p class="error">Não foi possível carregar o vídeo. Tente novamente.</p>';
        return;
      }

      var embedParams = new URLSearchParams({
        autoplay: params.get('autoplay') === '0' ? '0' : '1',
        rel: '0',
        playsinline: '1',
        modestbranding: '1',
        enablejsapi: '1',
        origin: location.origin
      });

      player.src =
        'https://www.youtube-nocookie.com/embed/' +
        encodeURIComponent(videoId) +
        '?' +
        embedParams.toString();
    })();
  </script>
</body>
</html>
